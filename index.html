<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Train">
<meta name="theme-color" content="#0c0c0c">
<title>Train</title>
<style>
:root{
  --bg:#0c0c0c;--card:#1a1a1a;--border:#282828;
  --text:#f0ede8;--muted:#606060;--muted2:#444;
  --yoga:#4ade80;--shoulder:#60a5fa;--cond:#fb923c;--med:#a78bfa;
  --sab:env(safe-area-inset-bottom,20px);--sat:env(safe-area-inset-top,44px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',sans-serif;overflow:hidden}
#app{height:100vh;height:100dvh;display:flex;flex-direction:column}
.scr{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding-top:calc(var(--sat)+8px);padding-bottom:24px;display:none}
.scr.on{display:block}
nav{display:flex;background:rgba(12,12,12,.96);border-top:.5px solid var(--border);padding-bottom:var(--sab);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);flex-shrink:0}
.nt{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:9px 0 7px;font-size:10px;letter-spacing:.03em;color:var(--muted);background:none;border:none;cursor:pointer;transition:color .15s;font-family:inherit}
.nt.on{color:var(--text)}
.ni{font-size:20px;line-height:1.2}
.hd{padding:4px 20px 14px}
.hd h1{font-size:26px;font-weight:700;letter-spacing:-.5px;line-height:1.1}
.hd p{font-size:13px;color:var(--muted);margin-top:4px}
.streak-wrap{padding:0 16px 14px}
.streak-pill{display:inline-flex;align-items:center;gap:8px;background:#1e1a0e;border:.5px solid #fb923c55;border-radius:22px;padding:8px 16px}
.s-num{font-size:22px;font-weight:700;letter-spacing:-1px;color:#fb923c}
.s-txt{font-size:12px;color:#fb923c;opacity:.8}
.s-zero{display:inline-flex;align-items:center;gap:6px;background:#1a1a1a;border:.5px solid var(--border);border-radius:22px;padding:7px 14px;font-size:12px;color:var(--muted)}
.wlist{padding:0 16px;display:flex;flex-direction:column;gap:10px}
.wc{display:flex;border-radius:15px;overflow:hidden;border:.5px solid var(--border);background:var(--card)}
.wstripe{width:4px;flex-shrink:0}
.wb{flex:1;padding:14px 14px 13px}
.wr{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
.wn{font-size:16px;font-weight:600;margin-bottom:3px;letter-spacing:-.2px}
.wd{font-size:12px;color:var(--muted);line-height:1.45}
.wrt{display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0}
.lbtn{font-size:13px;font-weight:700;padding:8px 18px;border-radius:22px;border:none;cursor:pointer;color:#000}
.dtag{font-size:11px;font-weight:600}
.pills{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px;padding-top:10px;border-top:.5px solid var(--border)}
.sp2{font-size:11px;background:#252525;padding:4px 10px 4px 12px;border-radius:20px;color:#999;display:flex;align-items:center;gap:5px}
.sx{background:none;border:none;color:var(--muted2);cursor:pointer;font-size:14px;padding:0;line-height:1}
#mo{display:none;position:fixed;inset:0;background:rgba(0,0,0,.78);z-index:100;align-items:flex-end}
#mo.on{display:flex}
#md{background:#1c1c1e;border-radius:22px 22px 0 0;padding:20px 20px calc(var(--sab)+22px);width:100%;animation:su .23s ease}
@keyframes su{from{transform:translateY(100%)}to{transform:translateY(0)}}
.mh{width:36px;height:4px;background:#3a3a3a;border-radius:2px;margin:0 auto 20px}
.mtt{font-size:17px;font-weight:600;text-align:center;margin-bottom:18px}
.tg{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:18px}
.tb{padding:14px;border-radius:13px;background:#2a2a2a;border:2px solid transparent;color:var(--text);font-size:15px;font-weight:500;cursor:pointer;text-align:center;transition:border-color .15s;font-family:inherit}
.tb.sel{border-color:var(--cond)}
.tr{display:flex;align-items:center;gap:12px;margin-bottom:20px}
.tr label{font-size:13px;color:var(--muted);white-space:nowrap}
.ti{flex:1;background:#2a2a2a;border:1.5px solid #383838;border-radius:11px;color:var(--text);font-size:24px;font-weight:600;padding:11px;text-align:center;width:100%;font-family:inherit}
.ti:focus{outline:none;border-color:var(--cond)}
.cb{width:100%;padding:16px;border-radius:14px;background:var(--cond);color:#000;font-size:16px;font-weight:700;border:none;cursor:pointer;font-family:inherit}
.pi{padding:0 16px}
.ov{background:var(--card);border-radius:15px;border:.5px solid var(--border);padding:18px 16px;margin-bottom:10px}
.ol{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px}
.op2{font-size:42px;font-weight:700;letter-spacing:-2px;margin-bottom:12px;line-height:1}
.bb{height:11px;background:#222;border-radius:6px;overflow:hidden}
.bf{height:100%;border-radius:6px;transition:width 1.1s cubic-bezier(.4,0,.2,1);width:0%}
.sl2{display:flex;flex-direction:column;gap:10px;margin-bottom:14px}
.sc{background:var(--card);border-radius:15px;border:.5px solid var(--border);padding:15px 16px}
.st{display:flex;justify-content:space-between;align-items:center;margin-bottom:11px}
.sn{font-size:14px;font-weight:600;letter-spacing:-.2px}
.spct{font-size:13px;color:var(--muted)}
.sbg{height:8px;background:#222;border-radius:4px;overflow:hidden;margin-bottom:8px}
.sbf{height:100%;border-radius:4px;transition:width 1s cubic-bezier(.4,0,.2,1);width:0%}
.sf{display:flex;justify-content:space-between;font-size:11px;color:var(--muted)}
.wgs{margin-bottom:4px}
.wgt{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px}
.wgr{display:grid;grid-template-columns:20px repeat(7,1fr);gap:4px;margin-bottom:4px;align-items:center}
.wgl{font-size:10px;color:var(--muted);text-align:center}
.dd{aspect-ratio:1;border-radius:7px;background:#161616;border:.5px solid #252525;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;min-height:34px}
.dd.fut{opacity:.2}
.ai{padding:0 16px}
.sec-hd{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px}
.sum-card{background:var(--card);border-radius:16px;border:.5px solid #a78bfa44;padding:18px 16px;margin-bottom:16px}
.sum-title{font-size:11px;font-weight:700;color:#a78bfa;text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px}
.sum-sub{font-size:20px;font-weight:700;letter-spacing:-.5px;margin-bottom:14px}
.sum-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.sum-stat{background:#222;border-radius:10px;padding:11px 12px}
.sum-val{font-size:20px;font-weight:700;letter-spacing:-1px}
.sum-lbl{font-size:10px;color:var(--muted);margin-top:2px}
.pr-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
.pr-card{background:var(--card);border:.5px solid var(--border);border-radius:13px;padding:13px 14px}
.pr-ico{font-size:18px;margin-bottom:6px}
.pr-val{font-size:20px;font-weight:700;letter-spacing:-1px}
.pr-lbl{font-size:10px;color:var(--muted);margin-top:2px;line-height:1.3}
.ach-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:20px}
.ac{background:var(--card);border:.5px solid var(--border);border-radius:13px;padding:13px 14px}
.ac.locked{opacity:.28;filter:grayscale(.5)}
.ac-ico{font-size:24px;margin-bottom:7px;line-height:1}
.ac-name{font-size:13px;font-weight:600;margin-bottom:3px}
.ac-desc{font-size:11px;color:var(--muted);line-height:1.4}
.ac-badge{font-size:10px;font-weight:700;margin-top:7px}
</style>
</head>
<body>
<div id="app">
  <div id="sl" class="scr on">
    <div class="hd"><h1 id="dh">Today</h1><p id="ds"></p></div>
    <div class="streak-wrap" id="swrap"></div>
    <div class="wlist" id="wl"></div>
  </div>
  <div id="sp" class="scr">
    <div class="hd"><h1>Progress</h1><p id="ps"></p></div>
    <div class="pi">
      <div class="ov">
        <div class="ol">3-week goal</div>
        <div class="op2" id="op">0%</div>
        <div class="bb"><div class="bf" id="bf"></div></div>
      </div>
      <div class="sl2" id="sl2"></div>
      <div class="wgs"><div class="wgt">Activity log</div><div id="wg"></div></div>
    </div>
  </div>
  <div id="sa" class="scr">
    <div class="hd"><h1>Achievements</h1><p id="aps"></p></div>
    <div class="ai" id="ai"></div>
  </div>
  <nav>
    <button class="nt on" id="nl"><span class="ni">◎</span>Today</button>
    <button class="nt" id="np"><span class="ni">▦</span>Progress</button>
    <button class="nt" id="na"><span class="ni">🏆</span>Achieved</button>
  </nav>
</div>
<div id="mo">
  <div id="md">
    <div class="mh"></div>
    <div class="mtt" id="mt">Log Conditioning</div>
    <div class="tg" id="tg">
      <button class="tb sel" id="tbr">🏃 Running</button>
      <button class="tb" id="tbb">🥊 Boxing</button>
    </div>
    <div class="tr">
      <label>Minutes</label>
      <input type="number" id="tm" class="ti" placeholder="45" min="1" max="360" inputmode="numeric">
    </div>
    <button class="cb" id="cbtn">Log Session</button>
  </div>
</div>
<script>
const K='train_v4';
const G={yoga:9,shoulder:9,conditioning:540,meditation:105};
const C={yoga:'#4ade80',shoulder:'#60a5fa',conditioning:'#fb923c',meditation:'#a78bfa'};
const NM={yoga:'Bikram Yoga',shoulder:'Shoulder Health',conditioning:'Conditioning',meditation:'Meditation'};
let ct='running', modalType='conditioning';

function ld(){try{return JSON.parse(localStorage.getItem(K))||{};}catch{return {};}}
function sd(s){localStorage.setItem(K,JSON.stringify(s));}
function gs(){const s=ld();if(!s.start)s.start='2026-04-25';if(!s.sess)s.sess=[];return s;}
function td(){const d=new Date();return `${d.getFullYear()}-${p2(d.getMonth()+1)}-${p2(d.getDate())}`;}
function p2(n){return String(n).padStart(2,'0');}
function pd2(str){const[y,m,d]=str.split('-').map(Number);return new Date(y,m-1,d);}
function dbt(a,b){return Math.round((b-a)/86400000);}
function ds2(d){return `${d.getFullYear()}-${p2(d.getMonth()+1)}-${p2(d.getDate())}`;}
function fmtM(m){if(!m||m<=0)return'';const h=Math.floor(m/60),r=Math.round(m%60);return h===0?`${m} min left`:r===0?`${h}h left`:`${h}h ${r}m left`;}
function fmtT(m){if(!m)return'—';const h=Math.floor(m/60),r=m%60;return h===0?`${m}min`:r===0?`${h}h`:`${h}h ${r}m`;}

function calcStreak(s){
  const dates=new Set(s.sess.map(x=>x.date));
  const today=td();
  let d=new Date();
  if(!dates.has(today))d.setDate(d.getDate()-1);
  let n=0;
  while(true){const ds=ds2(d);if(ds<s.start)break;if(dates.has(ds)){n++;d.setDate(d.getDate()-1);}else break;}
  return n;
}

function calcBest(s){
  const dates=new Set(s.sess.map(x=>x.date));
  const start=pd2(s.start);
  const days=Math.min(21,Math.max(0,dbt(start,pd2(td())))+1);
  let best=0,run=0;
  for(let i=0;i<days;i++){
    const dd=new Date(start.getTime()+i*86400000);
    if(dates.has(ds2(dd))){run++;best=Math.max(best,run);}else run=0;
  }
  return best;
}

function getPRs(s){
  const sess=s.sess;
  const cond=sess.filter(x=>x.type==='conditioning');
  const med=sess.filter(x=>x.type==='meditation');
  const lc=cond.length?Math.max(...cond.map(x=>x.duration)):0;
  const lm=med.length?Math.max(...med.map(x=>x.duration)):0;
  const byD={};sess.forEach(x=>{byD[x.date]=(byD[x.date]||0)+1;});
  const md=Object.values(byD).length?Math.max(...Object.values(byD)):0;
  return{longestCond:lc,longestMed:lm,maxDay:md,bestStreak:calcBest(s)};
}

function weekDone(s,wi){
  const start=pd2(s.start);
  const wd=new Set();
  for(let i=0;i<7;i++)wd.add(ds2(new Date(start.getTime()+(wi*7+i)*86400000)));
  return new Set(s.sess.filter(x=>wd.has(x.date)).map(x=>x.date)).size>=5;
}

const ACHS=[
  {id:'first',  ico:'⚡',name:'First Rep',       desc:'Log your first workout',                      col:'#facc15',check:s=>s.sess.length>0},
  {id:'s3',     ico:'🔥',name:'3-Day Streak',    desc:'3 consecutive days with any workout',         col:'#fb923c',check:s=>calcBest(s)>=3},
  {id:'s7',     ico:'🔥',name:'Week Warrior',    desc:'7 consecutive days logged',                   col:'#f97316',check:s=>calcBest(s)>=7},
  {id:'s21',    ico:'💎',name:'Unbroken',        desc:'All 21 days — not one missed',                col:'#a78bfa',check:s=>calcBest(s)>=21},
  {id:'perfect',ico:'⭐',name:'Perfect Day',     desc:'All 4 workouts in one day',                   col:'#facc15',check:s=>{const b={};s.sess.forEach(x=>{if(!b[x.date])b[x.date]=new Set();b[x.date].add(x.type);});return Object.values(b).some(t=>t.size>=4);}},
  {id:'iron',   ico:'🏋',name:'Iron Session',    desc:'90+ min conditioning in a single session',   col:'#fb923c',check:s=>s.sess.some(x=>x.type==='conditioning'&&x.duration>=90)},
  {id:'deep',   ico:'🧘',name:'Deep Sit',        desc:'30+ min meditation in a single session',     col:'#a78bfa',check:s=>s.sess.some(x=>x.type==='meditation'&&x.duration>=30)},
  {id:'w1',     ico:'✅',name:'Week 1 Done',     desc:'Active 5 of 7 days in week 1',               col:'#4ade80',check:s=>weekDone(s,0)},
  {id:'w2',     ico:'✅',name:'Week 2 Done',     desc:'Active 5 of 7 days in week 2',               col:'#4ade80',check:s=>weekDone(s,1)},
  {id:'w3',     ico:'✅',name:'Week 3 Done',     desc:'Active 5 of 7 days in week 3',               col:'#4ade80',check:s=>weekDone(s,2)},
  {id:'done',   ico:'🏆',name:'Program Complete',desc:'All 21 days are behind you',                 col:'#facc15',check:s=>dbt(pd2(s.start),pd2(td()))>=20},
];

function getUnlocked(s){return new Set(ACHS.filter(a=>a.check(s)).map(a=>a.id));}

function goTo(t){
  ['l','p','a'].forEach(x=>{
    document.getElementById('s'+x).classList.toggle('on',x===t);
    document.getElementById('n'+x).classList.toggle('on',x===t);
  });
  if(t==='p')rp();
  if(t==='a')ra();
}

function rl(){
  const s=gs();
  const today=td();
  const diff=dbt(pd2(s.start),pd2(today));
  const wk=Math.floor(diff/7)+1,dy=diff%7+1;
  const dn=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const mn=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const now=new Date();
  document.getElementById('dh').textContent=`${dn[now.getDay()]}, ${mn[now.getMonth()]} ${now.getDate()}`;
  if(today<s.start) document.getElementById('ds').textContent='Program starts Saturday, Apr 25';
  else if(diff>=21) document.getElementById('ds').textContent='Program complete!';
  else document.getElementById('ds').textContent=`Week ${Math.min(3,wk)} · Day ${dy} of 7`;

  const streak=calcStreak(s);
  const swrap=document.getElementById('swrap');
  if(today>=s.start){
    swrap.innerHTML=streak>0
      ?`<div class="streak-pill"><span style="font-size:18px">🔥</span><span class="s-num">${streak}</span><span class="s-txt">day streak</span></div>`
      :`<div class="s-zero">No streak yet — log something today</div>`;
  } else { swrap.innerHTML=''; }

  const ts=s.sess.map((x,i)=>({...x,_i:i})).filter(x=>x.date===today);
  const all=s.sess;
  const totals={
    yoga:all.filter(x=>x.type==='yoga').length,
    shoulder:all.filter(x=>x.type==='shoulder').length,
    conditioning:all.filter(x=>x.type==='conditioning').reduce((a,x)=>a+x.duration,0),
    meditation:all.filter(x=>x.type==='meditation').reduce((a,x)=>a+x.duration,0),
  };
  const c=document.getElementById('wl');
  c.innerHTML='';
  [{type:'yoga',desc:'90 min · 26 postures, heat, breath'},
   {type:'shoulder',desc:'20 min · Band work, Cuban press, Y-T-W, face pulls'},
   {type:'conditioning',desc:'Boxing or running · Enter your time'},
   {type:'meditation',desc:'Enter your time · Goal: 5 min every day'},
  ].forEach(w=>{
    const ws=ts.filter(x=>x.type===w.type);
    const done=ws.length>0;
    const isMins=w.type==='conditioning'||w.type==='meditation';
    const totalLabel=isMins?`${totals[w.type]} / ${G[w.type]} min`:`${totals[w.type]} / ${G[w.type]} sessions`;
    const pillsHTML=done?`<div class="pills">${ws.map(x=>{
      const ico=w.type==='conditioning'?(x.subtype==='boxing'?'🥊':'🏃'):w.type==='meditation'?'🧘':'✓';
      return `<span class="sp2">${ico} ${x.duration} min<button class="sx" data-del="${x._i}">×</button></span>`;
    }).join('')}</div>`:'';
    c.innerHTML+=`
    <div class="wc">
      <div class="wstripe" style="background:${C[w.type]}"></div>
      <div class="wb">
        <div class="wr">
          <div style="flex:1;min-width:0">
            <div class="wn">${NM[w.type]}</div>
            <div class="wd">${w.desc}</div>
            <div style="font-size:11px;color:${C[w.type]};margin-top:5px;font-weight:600">${totalLabel}</div>
          </div>
          <div class="wrt">
            <button class="lbtn" style="background:${C[w.type]}" data-log="${w.type}">Log</button>
            ${done?`<div class="dtag" style="color:${C[w.type]}">✓ Done</div>`:''}
          </div>
        </div>
        ${pillsHTML}
      </div>
    </div>`;
  });
}

function lw(type){
  if(type==='conditioning'||type==='meditation'){mopen(type);return;}
  const s=gs();
  s.sess.push({type,date:td(),duration:{yoga:90,shoulder:20}[type]});
  sd(s);rl();rp();
}

function ds3(i){
  const s=gs();s.sess.splice(i,1);sd(s);rl();rp();
}

function mopen(type){
  modalType=type;
  document.getElementById('mt').textContent=type==='meditation'?'Log Meditation':'Log Conditioning';
  document.getElementById('tg').style.display=type==='meditation'?'none':'grid';
  document.getElementById('tm').placeholder=type==='meditation'?'5':'45';
  document.getElementById('mo').classList.add('on');
  document.getElementById('tm').value='';
  setTimeout(()=>document.getElementById('tm').focus(),320);
}

function lc(){
  const m=parseInt(document.getElementById('tm').value);
  if(!m||m<1)return;
  const s=gs();
  if(modalType==='meditation') s.sess.push({type:'meditation',date:td(),duration:m});
  else s.sess.push({type:'conditioning',date:td(),duration:m,subtype:ct});
  sd(s);
  document.getElementById('mo').classList.remove('on');
  rl();rp();
}

function rp(){
  const s=gs();
  const sess=s.sess;
  const yc=sess.filter(x=>x.type==='yoga').length;
  const sc=sess.filter(x=>x.type==='shoulder').length;
  const cm=sess.filter(x=>x.type==='conditioning').reduce((a,x)=>a+x.duration,0);
  const mm=sess.filter(x=>x.type==='meditation').reduce((a,x)=>a+x.duration,0);
  const yp=Math.min(100,Math.round(yc/G.yoga*100));
  const shp=Math.min(100,Math.round(sc/G.shoulder*100));
  const cp=Math.min(100,Math.round(cm/G.conditioning*100));
  const mp=Math.min(100,Math.round(mm/G.meditation*100));
  const ov=Math.round((yp+shp+cp+mp)/4);
  const diff=Math.max(0,Math.min(21,dbt(pd2(s.start),pd2(td()))));
  document.getElementById('ps').textContent=`Day ${diff} of 21`;
  document.getElementById('op').textContent=`${ov}%`;
  const bf=document.getElementById('bf');
  bf.style.background=`linear-gradient(90deg,${C.yoga} 0%,${C.shoulder} 33%,${C.conditioning} 66%,${C.meditation} 100%)`;
  setTimeout(()=>{bf.style.width=`${ov}%`;},80);
  const sl=document.getElementById('sl2');
  sl.innerHTML='';
  [{key:'yoga',pct:yp,val:`${yc} / ${G.yoga} sessions`,rem:yc>=G.yoga?'':` ${G.yoga-yc} to go`},
   {key:'shoulder',pct:shp,val:`${sc} / ${G.shoulder} sessions`,rem:sc>=G.shoulder?'':` ${G.shoulder-sc} to go`},
   {key:'conditioning',pct:cp,val:`${cm} / ${G.conditioning} min`,rem:fmtM(Math.max(0,G.conditioning-cm))},
   {key:'meditation',pct:mp,val:`${mm} / ${G.meditation} min`,rem:fmtM(Math.max(0,G.meditation-mm))},
  ].forEach(d=>{
    const id=`b${d.key}`;
    sl.innerHTML+=`<div class="sc"><div class="st"><div class="sn">${NM[d.key]}</div><div class="spct">${d.pct}%</div></div><div class="sbg"><div class="sbf" id="${id}" style="background:${C[d.key]}"></div></div><div class="sf"><span>${d.val}</span><span style="color:${d.pct>=100?C[d.key]:'var(--muted)'}">${d.pct>=100?'✓ Complete':d.rem}</span></div></div>`;
    setTimeout(()=>{const el=document.getElementById(id);if(el)el.style.width=`${d.pct}%`;},160);
  });
  const wg=document.getElementById('wg');
  wg.innerHTML=`<div class="wgr"><div></div>${['Sa','Su','M','T','W','Th','F'].map(l=>`<div class="wgl">${l}</div>`).join('')}</div>`;
  for(let w=0;w<3;w++){
    let row=`<div class="wgr"><div class="wgl">W${w+1}</div>`;
    for(let d=0;d<7;d++){
      const off=w*7+d;
      const dd=new Date(pd2(s.start).getTime()+off*86400000);
      const dstr=ds2(dd);
      const fut=dd>new Date();
      const day=sess.filter(x=>x.date===dstr);
      let sty='',inner='';
      if(!fut&&day.length>0){
        const types=[...new Set(day.map(x=>x.type))];
        if(types.length===1){sty=`background:${C[types[0]]}25;border-color:${C[types[0]]};color:${C[types[0]]}`;inner=`${day.length}`;}
        else{sty=`background:#242424;border-color:#444`;inner=`<div style="display:flex;gap:2px;flex-wrap:wrap;justify-content:center">${types.map(t=>`<div style="width:5px;height:5px;border-radius:50%;background:${C[t]}"></div>`).join('')}</div>`;}
      }
      row+=`<div class="dd${fut?' fut':''}" style="${sty}">${inner}</div>`;
    }
    wg.innerHTML+=row+'</div>';
  }
}

function ra(){
  const s=gs();
  const sess=s.sess;
  const today=td();
  const diff=dbt(pd2(s.start),pd2(today));
  const unlocked=getUnlocked(s);
  const prs=getPRs(s);
  const c=document.getElementById('ai');
  c.innerHTML='';
  document.getElementById('aps').textContent=`${unlocked.size} / ${ACHS.length} unlocked`;
  if(diff>=20){
    const totalMins=sess.reduce((a,x)=>a+x.duration,0);
    const th=Math.floor(totalMins/60),tm2=totalMins%60;
    const yc=sess.filter(x=>x.type==='yoga').length;
    const sc=sess.filter(x=>x.type==='shoulder').length;
    const cm=sess.filter(x=>x.type==='conditioning').reduce((a,x)=>a+x.duration,0);
    const mm=sess.filter(x=>x.type==='meditation').reduce((a,x)=>a+x.duration,0);
    c.innerHTML+=`<div class="sum-card"><div class="sum-title">Program Complete</div><div class="sum-sub">3 weeks. You showed up.</div><div class="sum-grid"><div class="sum-stat"><div class="sum-val">${tm2===0?th+'h':th+'h '+tm2+'m'}</div><div class="sum-lbl">Total time trained</div></div><div class="sum-stat"><div class="sum-val">${prs.bestStreak}</div><div class="sum-lbl">Best streak (days)</div></div><div class="sum-stat"><div class="sum-val">${yc}</div><div class="sum-lbl">Yoga sessions</div></div><div class="sum-stat"><div class="sum-val">${sc}</div><div class="sum-lbl">Shoulder sessions</div></div><div class="sum-stat"><div class="sum-val">${fmtT(cm)}</div><div class="sum-lbl">Conditioning</div></div><div class="sum-stat"><div class="sum-val">${fmtT(mm)}</div><div class="sum-lbl">Meditation</div></div></div></div>`;
  }
  c.innerHTML+=`<div class="sec-hd">Personal records</div><div class="pr-grid"><div class="pr-card"><div class="pr-ico">🏃</div><div class="pr-val">${prs.longestCond?prs.longestCond+' min':'—'}</div><div class="pr-lbl">Longest conditioning session</div></div><div class="pr-card"><div class="pr-ico">🧘</div><div class="pr-val">${prs.longestMed?prs.longestMed+' min':'—'}</div><div class="pr-lbl">Longest meditation session</div></div><div class="pr-card"><div class="pr-ico">🔥</div><div class="pr-val">${prs.bestStreak||'—'}</div><div class="pr-lbl">Best streak (days)</div></div><div class="pr-card"><div class="pr-ico">⭐</div><div class="pr-val">${prs.maxDay||'—'}</div><div class="pr-lbl">Most workouts in one day</div></div></div><div class="sec-hd">Achievements</div><div class="ach-grid">${ACHS.map(a=>{const on=unlocked.has(a.id);return`<div class="ac${on?'':' locked'}"><div class="ac-ico">${a.ico}</div><div class="ac-name">${a.name}</div><div class="ac-desc">${a.desc}</div><div class="ac-badge" style="color:${on?a.col:'var(--muted2)'}">${on?'✓ Unlocked':'Locked'}</div></div>`;}).join('')}</div><div style="text-align:center;padding:16px 0 4px"><button data-action="reset" style="background:#1e0a0a;border:1px solid #7a3030;border-radius:10px;color:#e07070;font-size:13px;padding:12px 28px;cursor:pointer;font-family:inherit;font-weight:500">Reset all progress</button></div>`;
}

let resetPending=false;
function resetAll(){
  const btn=document.querySelector('[data-action="reset"]');
  if(!btn)return;
  if(!resetPending){
    resetPending=true;
    btn.textContent='Tap again to confirm reset';
    btn.style.background='#3a0a0a';
    btn.style.borderColor='#cc4444';
    btn.style.color='#ff8888';
    setTimeout(()=>{
      resetPending=false;
      if(btn){btn.textContent='Reset all progress';btn.style.background='#1e0a0a';btn.style.borderColor='#7a3030';btn.style.color='#e07070';}
    },3000);
  } else {
    resetPending=false;
    sd({start:td(),sess:[]});
    rl();rp();ra();
  }
}

// ── Event listeners ───────────────────────────────────
document.getElementById('ai').addEventListener('click',e=>{
  if(e.target.closest('[data-action="reset"]')) resetAll();
});
document.getElementById('nl').addEventListener('click',()=>goTo('l'));
document.getElementById('np').addEventListener('click',()=>goTo('p'));
document.getElementById('na').addEventListener('click',()=>goTo('a'));
document.getElementById('tbr').addEventListener('click',()=>{ct='running';document.getElementById('tbr').classList.add('sel');document.getElementById('tbb').classList.remove('sel');});
document.getElementById('tbb').addEventListener('click',()=>{ct='boxing';document.getElementById('tbb').classList.add('sel');document.getElementById('tbr').classList.remove('sel');});
document.getElementById('cbtn').addEventListener('click',lc);
document.getElementById('mo').addEventListener('click',e=>{if(e.target===document.getElementById('mo'))document.getElementById('mo').classList.remove('on');});
document.getElementById('wl').addEventListener('click',e=>{
  const logBtn=e.target.closest('[data-log]');
  if(logBtn) lw(logBtn.dataset.log);
  const delBtn=e.target.closest('[data-del]');
  if(delBtn) ds3(parseInt(delBtn.dataset.del));
});

rl();
</script>
